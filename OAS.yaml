openapi: 3.0.3
info:
  title: Dish Ingredient API
  version: 1.0.0
  description: API for managing ingredients and their stock movements.

servers:
  - url: http://localhost:8080

paths:
  /ingredients:
    get:
      summary: Retrieve a list of ingredients
      description: Returns a paginated list of ingredients, optionally filtered by name, category, or associated dish name.
      parameters:
        - name: page
          in: query
          description: The page number to retrieve (1-indexed).
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          description: The number of elements per page.
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: A list of ingredients retrieved successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ingredient'

  /ingredients/{id}:
    get:
      summary: Retrieve an ingredient by ID
      description: Returns a single ingredient based on the provided unique identifier.
      parameters:
        - name: id
          in: path
          required: true
          description: The unique ID of the ingredient.
          schema:
            type: integer
      responses:
        '200':
          description: Ingredient found and retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ingredient'
        '404':
          description: Ingredient not found.

  /ingredients/{id}/stock:
    get:
      summary: Get ingredient stock level
      description: Returns the current stock value of a specific ingredient.
      parameters:
        - name: id
          in: path
          required: true
          description: The unique ID of the ingredient.
          schema:
            type: integer
        - name: at
          in: query
          description: The timestamp to check the stock at (ISO 8601 format).
          schema:
            type: string
            format: date-time
        - name: unit
          in: query
          description: The unit to return the stock in.
          schema:
            type: string
            enum: [PCS, KG, L]
      responses:
        '200':
          description: Stock value retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockValue'
        '404':
          description: Ingredient not found.

  /dishes:
    get:
      summary: Retrieve all dishes
      description: Returns a list of all dishes in the system.
      responses:
        '200':
          description: List of dishes retrieved successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Dish'

  /dishes/{id}/ingredients:
    put:
      summary: Update dish ingredients
      description: Updates the list of ingredients associated with a specific dish.
      parameters:
        - name: id
          in: path
          required: true
          description: The unique ID of the dish.
          schema:
            type: integer
      requestBody:
        description: List of ingredients to associate with the dish.
        required: false
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Ingredient'
      responses:
        '200':
          description: Dish ingredients updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dish'
        '404':
          description: Dish not found.

components:
  schemas:
    Ingredient:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Carrot"
        price:
          type: number
          format: double
          example: 2.5
        category:
          type: string
          enum: [VEGETABLE, ANIMAL, MARINE, DAIRY, OTHER]
          example: "VEGETABLE"
        stockMovementList:
          type: array
          items:
            $ref: '#/components/schemas/StockMovement'

    StockMovement:
      type: object
      properties:
        id:
          type: integer
          example: 1
        type:
          type: string
          enum: [IN, OUT]
        value:
          type: object
          properties:
            quantity:
              type: number
              example: 10.0
            unit:
              type: string
              example: "KG"
        creationDatetime:
          type: string
          format: date-time
          example: "2026-04-14T10:00:00Z"

    StockValue:
      type: object
      properties:
        quantity:
          type: number
          format: double
          example: 15.5
        unit:
          type: string
          enum: [PCS, KG, L]
          example: "KG"

    Dish:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Beef Bourguignon"
        dishType:
          type: string
          enum: [START, MAIN, DESSERT]
          example: "MAIN"
        sellingPrice:
          type: number
          format: double
          example: 25.0
        ingredients:
          type: array
          items:
            $ref: '#/components/schemas/DishIngredient'

    DishIngredient:
      type: object
      properties:
        ingredient:
          $ref: '#/components/schemas/Ingredient'
        quantityRequired:
          type: number
          format: double
          example: 0.2
